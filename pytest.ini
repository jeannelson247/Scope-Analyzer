[pytest]
# Add the project root to sys.path so tests can `import csv_loader`,
# `import ai_assistant`, etc. regardless of how pytest is launched
# (bare `pytest` does NOT add the cwd; `python -m pytest` does — this
# makes both, and CI, behave identically).
pythonpath = .

# Only collect the real test suite. Without this, pytest also tries to
# import inactive draft tools under tool_sandbox/ (test_tool.py), which
# are not importable on their own and are not part of the product.
testpaths = tests
